<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex練習</title>
    <style>
        .container{
            width: 600px;
            height: 400px;
            background-color: antiquewhite;
            display:flex;
            /* 水平對齊 row橫向/column直向 */
            justify-content: space-between; /* flex-start/ flex-end/ center*/
            /* 垂直對齊 row橫向/column直向 */
            align-items: center; /* flex-start/ flex-end/ center/ baseline/ stretch */
        }
        .box1{
            width: 100px;
            height: 100px;
            background-color: red;
        }
        .box2{
            width: 100px;
            height: 100px;
            background-color: green;
        }
    </style>
</head>
<body>
    <!-- .container>.box1+.box2 -->
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
