<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RWD 名片練習</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 在這裡開始寫 CSS 手機版*/ 
    .container{
        width: 100%;
        max-width: 800px;
        margin: 50px auto;
    }
    .brand{
        background-image: linear-gradient(to right top, #eb4788, #db368d, #c72692, #b11b98, #97169d);
        color: white;
        padding: 30px;
        border-top-left-radius: 15px; 
        border-top-right-radius: 15px;  
    }
    .info{
        background-color: #ffffff;
        color: rgb(29, 29, 29);
        padding: 30px;
        border-bottom-left-radius: 15px; 
        border-bottom-right-radius: 15px;  
    }
    /* 聯絡資訊 */
    .details{
        list-style: none;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .details li{
        display: flex;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 2px solid #a09aa9;
      
    }
    .details strong{
        width: 48px;
        color: #64748b;
    }
    /* 服務項目 tags */
    .tags{
        margin-bottom: 20px;
    }
    .tags span{
        padding: 6px 14px;
        background-image: linear-gradient(to right top, #f496f0, #e67ee2, #d865d3, #ca4ac5, #bc28b6);
        color: white;
        border-radius: 14px;
    }
    /* 按鈕區 */
    .btn{
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 20px;
    }
    .btn-primary{
        background-color: rgb(76, 90, 223);
        color: white;
    }
    .btn-secondary{
        background-color: rgb(143, 153, 236);
        color: white;
    }
    .card{
        border-radius: 15px;
        box-shadow: 6px 6px 17px 0px rgba(0, 0, 0, 0.3);
    }
    @media (min-width: 768px) {
        /* 電腦版 */
        .card{
            display: flex;
            flex-direction: row;
        }
        .brand{
            border-top-left-radius: 15px;
            border-top-right-radius: 0px;
            border-bottom-left-radius: 15px;
        }
        .info{
            border-top-left-radius: 0px;
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
        }
    }
  </style>
</head>
<body>
  <section class="container">
    <div class="card">

      <!-- 左側品牌區 -->
      <div class="brand">
        <div class="logo">
            <img src="imgs/device.svg" alt="MacroViz Logo">
        </div>
        <h1>廣瞻互動媒體<br>MacroViz</h1>
        <p>專注互動媒體、品牌視覺與前端整合，讓品牌在手機與平板都清楚呈現。</p>
      </div>

      <!-- 右側資訊區 -->
      <div class="info">
        <header>
          <h2>林若亞</h2>
          <p class="role">品牌設計總監 / Brand Director</p>
        </header>

        <p class="summary">擁有超過十年的品牌設計與視覺整合經驗，擅長將使用者需求轉化為具備美感與功能性的設計方案，曾帶領團隊為多個國際品牌打造數位轉型視覺體系。</p>

        <ul class="details">
          <li>
            <strong>電話</strong>
            <span>0928-617-245</span>
          </li>
          <li>
            <strong>Email</strong>
            <a href="mailto:hello@macroviz.tw">hello@macroviz.tw</a>
          </li>
          <li>
            <strong>地址</strong>
            <span>Taichung, Taiwan</span>
          </li>
        </ul>

        <div class="tags">
          <span>互動設計</span>
          <span>品牌網站</span>
          <span>前端整合</span>
        </div>

        <div class="actions">
          <a class="btn btn-primary" href="mailto:hello@macroviz.tw">聯絡我</a>
          <a class="btn btn-secondary" href="#">作品集</a>
        </div>
      </div>

    </div>
  </section>
</body>
</html>
